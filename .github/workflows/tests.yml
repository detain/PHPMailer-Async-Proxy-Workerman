name: "Tests"

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:

  coding-standard:
    runs-on: ubuntu-22.04
    name: Coding standards
    permissions:
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: '8.3'
          coverage: none
          tools: cs2pr
          extensions: ctype, filter, hash, sockets, pcntl, openssl, mbstring

      - name: Install Composer dependencies
        uses: "ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda" # 4.0.0
        with:
          custom-cache-suffix: $(date -u "+%Y-%m")

      - name: Check coding standards
        id: phpcs
        run: ./vendor/bin/phpcs -s --report-full --report-checkstyle=./phpcs-report.xml

      - name: Show PHPCS results in PR
        if: ${{ always() && steps.phpcs.outcome == 'failure' }}
        run: cs2pr ./phpcs-report.xml

  lint:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
        experimental: [false]
        include:
          - php: '8.5'
            experimental: true
          - php: 'nightly'
            experimental: true

    name: "Lint: PHP ${{ matrix.php }}"
    continue-on-error: ${{ matrix.experimental }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: ${{ matrix.php }}
          ini-values: error_reporting=-1, display_errors=On, display_startup_errors=On
          coverage: none
          tools: cs2pr
          extensions: ctype, filter, hash, sockets, pcntl, openssl, mbstring

      - name: Install Composer dependencies
        uses: "ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda" # 4.0.0
        with:
          composer-options: ${{ matrix.experimental && '--ignore-platform-reqs' || '' }}
          custom-cache-suffix: $(date -u "+%Y-%m")

      - name: Lint against parse errors
        if: ${{ matrix.php != 'nightly' }}
        run: composer lint -- --checkstyle | cs2pr

      - name: Lint against future parse errors (PHP nightly)
        if: ${{ matrix.php == 'nightly' }}
        run: composer lint

  test-sync:
    needs: ['coding-standard', 'lint']
    runs-on: ubuntu-22.04
    name: "Tests (sync transport): PHP ${{ matrix.php }}"
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
        coverage: [false]
        include:
          - php: '8.4'
            coverage: true

    permissions:
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: ${{ matrix.php }}
          coverage: ${{ matrix.coverage && 'xdebug' || 'none' }}
          ini-values: sendmail_path=/usr/sbin/sendmail -t -i, error_reporting=-1, display_errors=On, display_startup_errors=On
          extensions: ctype, filter, hash, sockets, pcntl, openssl, mbstring, imap, intl

      - name: Install Composer dependencies
        uses: "ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda" # 4.0.0
        with:
          custom-cache-suffix: $(date -u "+%Y-%m")

      - name: Install postfix (for legacy SendTestCase tests)
        uses: nick-invision/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 2
          max_attempts: 3
          retry_wait_seconds: 8
          command: |
            sudo apt-get install --fix-broken -y libsqlite3-0 postfix
            sudo systemctl stop postfix.service

      - name: Set up sendmail + smtp-sink
        run: |
          smtp-sink -d "%d.%H.%M.%S" localhost:2500 1000 &
          mkdir -p build/logs
          sudo cp test/testbootstrap-dist.php test/testbootstrap.php
          sudo chmod +x test/fakesendmail.sh
          sudo mkdir -p /var/qmail/bin
          sudo cp test/fakesendmail.sh /var/qmail/bin/sendmail
          sudo cp test/fakesendmail.sh /usr/sbin/sendmail

      - name: Run upstream + sync tests
        if: ${{ matrix.coverage == false }}
        run: ./vendor/bin/phpunit --no-coverage --exclude-testsuite-from-default ''

      - name: Run with code coverage
        if: ${{ matrix.coverage == true }}
        run: vendor/bin/phpunit

      - name: Send coverage report to Codecov
        if: ${{ success() && matrix.coverage == true && github.event.repository.fork == false }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./build/logs/clover.xml
          fail_ci_if_error: true
          verbose: true

  test-async:
    needs: ['coding-standard', 'lint']
    runs-on: ubuntu-22.04
    name: "Tests (async transport): PHP ${{ matrix.php }}"
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']

    permissions:
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          ini-values: error_reporting=-1, display_errors=On, display_startup_errors=On
          extensions: ctype, filter, hash, sockets, pcntl, openssl, mbstring

      - name: Install Composer dependencies
        uses: "ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda" # 4.0.0
        with:
          custom-cache-suffix: $(date -u "+%Y-%m")

      - name: Run async + proxy-protocol tests
        run: ./vendor/bin/phpunit --no-coverage test/Async/ test/ProxyProtocol/
